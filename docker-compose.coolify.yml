# Coolify Docker Compose
# ─────────────────────────────────────────────────────────────
# Deploy steps:
#   1. Push this repo to GitHub/GitLab
#   2. Coolify → New Resource → Docker Compose → connect your repo
#   3. Set "Compose file" to docker-compose.coolify.yml
#   4. Under the frontend service → Domains → enter your domain
#   5. Hit Deploy — Coolify builds images, wires SSL, done.
# ─────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/raptor
      - PORT=5000
      - FRONTEND_URL=http://165.232.188.63
      - SERVICE_FQDN_BACKEND_5000=http://api.165.232.188.63.sslip.io
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://api.165.232.188.63.sslip.io/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_FRONTEND_80=http://165.232.188.63
volumes:
  mongo_data:
