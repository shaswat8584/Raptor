services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - raptor_net

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/raptor
      PORT: 5000
    depends_on:
      - mongo
    networks:
      - raptor_net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - raptor_net

volumes:
  mongo_data:

networks:
  raptor_net:
